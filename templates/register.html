<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body { font-family: Arial; background: #f1f5f9; text-align: center; }
        form {
            background: white;
            padding: 25px;
            margin: 50px auto;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
        }
        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            background: #2563eb;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<form method="POST">
    <h3>🚗 Register Vehicle</h3>

    <input type="text" name="name" placeholder="Owner Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <input type="text" name="family" placeholder="Family Number" required>
    <input type="text" name="vehicle" placeholder="Vehicle Number" required>

    <button type="submit">Register</button>
</form>

</body>
</html>
