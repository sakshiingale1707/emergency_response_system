<!DOCTYPE html>
<html>
<head>
    <title>Register Vehicle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { text-align:center; font-family:Arial; padding:20px; }
        input { width:90%; padding:12px; margin:10px; }
        button { padding:12px; background:green; color:white; border:none; }
    </style>
</head>

<body>

<h2>🚗 Register Vehicle</h2>

<form method="POST">
    <input name="vehicle" placeholder="Vehicle Number" required><br>
    <input name="name" placeholder="Owner Name" required><br>
    <input name="phone" placeholder="Owner Phone" required><br>
    <input name="family" placeholder="Family Phone" required><br>

    <button type="submit">Generate QR</button>
</form>

</body>
</html>
